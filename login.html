<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login | MEDinsta</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#f0f7f4] min-h-screen flex items-center justify-center">
    <div class="bg-white p-8 rounded-3xl shadow-xl w-full max-w-md text-center">
        <h1 class="text-3xl font-bold mb-4 text-[#2d5a43]">MEDinsta</h1>
        <h2 class="text-xl font-bold mb-6">Login</h2>

        {% with messages = get_flashed_messages() %}
          {% if messages %}
            {% for message in messages %}
              <p class="mb-4 text-red-500 font-bold">{{ message }}</p>
            {% endfor %}
          {% endif %}
        {% endwith %}

        <form action="/login" method="POST" class="space-y-4 text-left">
            <div>
                <label class="text-sm font-bold text-gray-500 ml-1">EMAIL</label>
                <input name="email" type="email" required class="w-full p-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-green-500 outline-none">
            </div>
            <div>
                <label class="text-sm font-bold text-gray-500 ml-1">PASSWORD</label>
                <input name="password" type="password" required class="w-full p-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-green-500 outline-none">
            </div>
            <button type="submit" class="w-full bg-[#2d5a43] text-white p-4 rounded-xl font-bold hover:bg-green-800 transition shadow-lg mt-4">Login</button>
        </form>

        <p class="mt-6">No account? <a href="/signup" class="text-[#2d5a43] font-bold underline">Sign up</a></p>
    </div>
</body>
</html>
