<!DOCTYPE html>
<html>
<head>

<title>Search Results</title>
<script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-gray-100">

<div class="container mx-auto py-10 px-4">

<h1 class="text-3xl font-bold mb-8">
Results for "{{ query }}"
</h1>

<div class="grid md:grid-cols-3 gap-6">

{% for med in medicines %}

<div class="bg-white p-6 rounded-xl shadow">

<h2 class="font-bold text-lg">{{ med.name }}</h2>

<p class="text-blue-600 font-semibold">
{{ med.generic }}
</p>

<p class="text-lg font-bold mt-2">
₹{{ med.price }}
</p>

<p class="text-sm text-gray-500 mt-2">
<i class="fa-solid fa-store"></i> {{ med.pharmacy }}
</p>

<a
href="https://www.google.com/maps/search/{{ med.pharmacy }}"
target="_blank"
class="block mt-4 bg-green-700 text-white text-center py-2 rounded-lg"
>
Open in Maps
</a>

</div>

{% endfor %}

</div>

<div class="mt-10">
<a href="/" class="bg-gray-800 text-white px-6 py-3 rounded-lg">
Back Home
</a>
</div>

</div>

</body>
</html>
