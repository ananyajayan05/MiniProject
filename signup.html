<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Signup | MEDinsta</title>

<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

</head>

<body class="bg-[#f0f7f4] flex items-center justify-center min-h-screen">

<div class="bg-white p-10 rounded-xl shadow-lg w-full max-w-md">

<h2 class="text-2xl font-bold text-center mb-6">
Create <span class="med">MED</span><span class="insta">insta</span> Account
</h2>

<form method="POST" action="/signup" class="space-y-4">

<div>
<label class="block text-sm font-semibold mb-1">Email</label>
<input type="email" name="email" required
class="w-full border rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-green-600">
</div>

<div>
<label class="block text-sm font-semibold mb-1">Password</label>
<input type="password" name="password" required
class="w-full border rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-green-600">
</div>

<div>
<label class="block text-sm font-semibold mb-1">Confirm Password</label>
<input type="password" name="confirm_password" required
class="w-full border rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-green-600">
</div>

<button type="submit"
class="w-full bg-[#2d5a43] text-white py-2 rounded-lg font-bold hover:bg-green-900 transition">
Signup
</button>

</form>

<p class="text-sm text-center mt-5">
Already have an account?
<a href="/login" class="text-green-700 font-bold hover:underline">Login</a>
</p>

<a href="/" class="block text-center text-gray-500 mt-4 text-sm hover:underline">
← Back to Home
</a>

</div>

</body>
</html>
