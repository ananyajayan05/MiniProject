<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Signup | MEDinsta</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#f0f7f4] min-h-screen flex items-center justify-center p-4">
    <div class="bg-white p-8 rounded-3xl shadow-xl w-full max-w-md text-center">
        <h1 class="text-3xl font-bold mb-4 text-[#2d5a43]">MEDinsta</h1>
        <h2 class="text-xl font-bold mb-6 text-gray-700">Create Account</h2>
        
        {% with messages = get_flashed_messages() %}
          {% if messages %}
            {% for message in messages %}
              <p class="mb-4 text-red-500 font-bold">{{ message }}</p>
            {% endfor %}
          {% endif %}
        {% endwith %}

        <form action="/signup" method="POST" class="space-y-4 text-left">
            <div>
                <label class="text-sm font-bold text-gray-500 ml-1">FIRST NAME</label>
                <input name="firstName" type="text" required class="w-full p-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-green-500 outline-none">
            </div>
            <div>
                <label class="text-sm font-bold text-gray-500 ml-1">EMAIL</label>
                <input name="email" type="email" required class="w-full p-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-green-500 outline-none">
            </div>
            <div>
                <label class="text-sm font-bold text-gray-500 ml-1">PASSWORD</label>
                <input name="password" type="password" required class="w-full p-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-green-500 outline-none">
            </div>
            <button type="submit" class="w-full bg-[#2d5a43] text-white p-4 rounded-xl font-bold hover:bg-green-800 transition shadow-lg mt-4">Sign Up</button>
        </form>
        <p class="mt-6 text-gray-500">Already have an account? <a href="/login" class="text-green-700 font-bold underline">Login</a></p>
    </div>
</body>
</html>
