<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Search Results | MEDinsta</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-[#f0f7f4]">
    <nav class="bg-white border-b p-4 sticky top-0 z-50">
        <div class="container mx-auto">
            <a href="/" class="text-[#2d5a43] font-bold flex items-center">
                <i class="fa-solid fa-arrow-left mr-2"></i> Back to Home
            </a>
        </div>
    </nav>

    <main class="container mx-auto px-4 py-8">
        <h2 class="text-2xl font-bold text-gray-800 mb-6">Results for "{{ query }}"</h2>
        
        {% if results %}
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            {% for item in results %}
            <div class="bg-white p-5 rounded-2xl shadow-sm border border-gray-100 hover:shadow-md transition">
                <div class="flex justify-between items-start mb-3">
                    <div>
                        <h4 class="font-bold text-gray-800 text-lg">{{ item.name }}</h4>
                        <p class="text-[10px] text-blue-600 font-bold uppercase tracking-wider">{{ item.generic }}</p>
                    </div>
                    <span class="text-[10px] bg-green-100 text-green-700 px-2 py-1 rounded font-bold">IN STOCK</span>
                </div>
                <div class="text-sm text-gray-600 mb-4">
                    <p><i class="fa-solid fa-store mr-2 opacity-50"></i>{{ item.pharmacy }}</p>
                    <p class="text-xl font-black text-gray-900 mt-2">₹{{ item.price }}</p>
                </div>
                <button class="w-full bg-[#2d5a43] text-white py-2 rounded-lg font-bold hover:bg-green-800 transition">Check Directions</button>
            </div>
            {% endfor %}
        </div>
        {% else %}
        <div class="text-center py-20 bg-white rounded-3xl shadow-sm border">
            <p class="text-gray-500 text-lg">No stock found for "{{ query }}" in your area.</p>
            <a href="/" class="mt-4 inline-block text-[#2d5a43] font-bold">Try another search</a>
        </div>
        {% endif %}
    </main>
</body>
</html>
